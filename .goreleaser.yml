version: 2

project_name: devrune

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: devrune
    main: ./cmd/devrune
    binary: devrune
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Limit linux to amd64 only for MVP
    ignore:
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: devrune-archive
    builds:
      - devrune
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: davidarce
    name: DevRune
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
